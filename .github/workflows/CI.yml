name: CI
env:
  MACOSX_DEPLOYMENT_TARGET: '10.13'
permissions:
  contents: write
  id-token: write
on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
    paths-ignore:
      - '**/*.md'
      - LICENSE
      - '**/*.gitignore'
      - .editorconfig
      - docs/**
  pull_request:
    branches:
      - '**'

jobs:
  rust-checks:
    # PR/branch gate only — a tag push is a release of an already-merged, already-gated commit,
    # so it doesn't need to re-run lint/fmt (avoids a redundant re-run at deploy time, #489).
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Clippy
        run: rustup component add clippy && cargo clippy --workspace --all-features --all-targets -- -D warnings

      - name: Unused dependencies
        run: |
          cargo install cargo-machete --locked
          cargo machete
        continue-on-error: true

      - name: Fmt
        run: rustup component add rustfmt && cargo fmt --all -- --check

  build:
    name: Build and test on ${{ matrix.os }} - Rust stable
    # PR/branch gate only — the merged tree was already tested here before the tag was cut;
    # re-running the full matrix+test-suite at deploy time is redundant + a flake-exposure
    # surface (blocked a release, #488). Deploy = build + package + publish only (#489).
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    needs: rust-checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --workspace --all-features --all-targets --verbose

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Test (nextest, retry flaky)
        run: cargo nextest run --workspace --all-features --retries 2

  publish-crates:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    # Deploy = build + package + publish only (#489) — does NOT depend on `build`'s test matrix;
    # the tagged commit was already gated by CI on its PR before merge, so re-running the full
    # test suite here would be a redundant, flake-exposed re-test at deploy time (see #488).
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Build (package verification only, no test rerun)
        run: cargo build --workspace --all-features --release
      - name: Verify tag version matches Cargo.toml
        run: |
          TAG_REF="${GITHUB_REF##*/}"
          echo "Tag ref: $TAG_REF"
          TAG_VERSION="${TAG_REF#v}"
          echo "Tag version (no v): $TAG_VERSION"
          FILE_VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*=\s*"\(.*\)"/\1/')
          echo "Cargo.toml version: $FILE_VERSION"
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match Cargo.toml version ($FILE_VERSION)" >&2
            exit 1
          fi
      - name: Publish to crates.io
        run: |
          cargo login $CARGO_REGISTRY_TOKEN
          cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
